<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drum Transcriber Upload</title>
</head>
<body>
  <h2>Upload audio to transcribe drums</h2>
  <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" accept=".wav,.mp3,.flac,.m4a,.ogg" required />
    <label>
      <input type="checkbox" name="quantize" value="true" /> Quantize output
    </label>
    <button type="submit">Upload & Transcribe</button>
  </form>
  <p>After upload the browser will download the generated MIDI file.</p>
</body>
</html>
